apiVersion: batch/v1
kind: CronJob
metadata:
  name: akv-sync
  namespace: akv-sync
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 2
      template:
        metadata:
          labels:
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: akv-sync-sa
          restartPolicy: OnFailure
          containers:
            - name: akv-sync
              image: "${ACR_LOGIN_SERVER}/akv-sync-python:latest"
              envFrom:
                - configMapRef:
                    name: akv-sync-config
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                runAsUser: 1000
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
